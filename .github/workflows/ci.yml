name: CI

on:
  push:
    branches:
      - main
      - feature/package-split
  pull_request:
  workflow_dispatch:

jobs:
  elisp:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs-version:
          - "29.1"
          - "29.4"

    steps:
      - uses: actions/checkout@v4

      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - name: Install package dependencies
        run: |
          git clone --depth 1 https://github.com/emacs-straight/peg.git "$RUNNER_TEMP/peg"
          PEG_CHECKOUT="$RUNNER_TEMP/peg" emacs -Q --batch \
            --eval "(require 'package)" \
            --eval "(require 'package-vc)" \
            --eval "(setq package-archives nil)" \
            --eval "(package-initialize)" \
            --eval "(package-vc-install-from-checkout (getenv \"PEG_CHECKOUT\") \"peg\")"
          emacs -Q --batch \
            --eval "(require 'package)" \
            --eval "(setq package-archives '((\"melpa\" . \"https://melpa.org/packages/\")))" \
            --eval "(package-initialize)" \
            --eval "(package-refresh-contents)" \
            --eval "(dolist (pkg '(transient mysql pg package-lint)) (unless (package-installed-p pkg) (package-install pkg)))"

      - name: Run main ERT suite
        run: |
          emacs -Q --batch \
            --eval "(require 'package)" \
            --eval "(package-initialize)" \
            -L . \
            -l ert \
            -l clutch \
            -l test/clutch-test.el \
            --eval "(ert-run-tests-batch-and-exit)"

      - name: Run JDBC backend ERT suite
        run: |
          emacs -Q --batch \
            --eval "(require 'package)" \
            --eval "(package-initialize)" \
            -L . \
            -l ert \
            -l clutch-db-jdbc \
            -l test/clutch-db-test.el \
            --eval "(ert-run-tests-batch-and-exit \"clutch-db-test-jdbc\")"

      - name: Byte compile
        run: |
          emacs -Q --batch \
            --eval "(require 'package)" \
            --eval "(package-initialize)" \
            -L . \
            -f batch-byte-compile \
            *.el

      - name: Package lint
        run: |
          emacs -Q --batch \
            --eval "(require 'package)" \
            --eval "(setq package-archives '((\"melpa\" . \"https://melpa.org/packages/\")))" \
            --eval "(package-initialize)" \
            --eval "(package-refresh-contents)" \
            -L . \
            -l package-lint \
            --eval "(setq package-lint-main-file \"clutch.el\")" \
            -f package-lint-batch-and-exit \
            clutch-ui.el \
            clutch-schema.el \
            clutch-query.el \
            clutch-object.el \
            clutch-edit.el \
            clutch-db.el \
            clutch-db-sqlite.el \
            clutch-db-pg.el \
            clutch-db-mysql.el \
            clutch-db-jdbc.el \
            clutch-connection.el \
            clutch-compat.el \
            clutch.el

      - name: Checkdoc entry file
        run: |
          emacs -Q --batch \
            --eval "(require 'package)" \
            --eval "(package-initialize)" \
            -L . \
            --eval "(require 'checkdoc)" \
            --eval "(checkdoc-file \"clutch.el\")" \
            --eval "(when (get-buffer \"*warn*\") (with-current-buffer \"*warn*\" (goto-char (point-min)) (when (re-search-forward \"^Warning\" nil t) (princ (buffer-string)) (kill-emacs 1))))"
