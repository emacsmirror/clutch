name: CI

on:
  push:
    branches:
      - main
      - feature/package-split
  pull_request:
  workflow_dispatch:

jobs:
  elisp:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        emacs-version:
          - "29.1"
          - "29.4"

    steps:
      - uses: actions/checkout@v4

      - uses: purcell/setup-emacs@master
        with:
          version: ${{ matrix.emacs-version }}

      - name: Install package dependencies
        run: |
          git clone --depth 1 https://github.com/LuciusChen/mongodb.el.git "$GITHUB_WORKSPACE/../mongodb.el"
          git clone --depth 1 https://github.com/LuciusChen/redis.el.git "$GITHUB_WORKSPACE/../redis.el"
          git clone --depth 1 https://github.com/emacs-straight/peg.git "$RUNNER_TEMP/peg"
          PEG_CHECKOUT="$RUNNER_TEMP/peg" emacs -Q --batch \
            --eval "(require 'package)" \
            --eval "(require 'package-vc)" \
            --eval "(setq package-archives nil)" \
            --eval "(package-initialize)" \
            --eval "(package-vc-install-from-checkout (getenv \"PEG_CHECKOUT\") \"peg\")"
          emacs -Q --batch \
            --eval "(require 'package)" \
            --eval "(setq package-archives '((\"melpa\" . \"https://melpa.org/packages/\")))" \
            --eval "(package-initialize)" \
            --eval "(package-refresh-contents)" \
            --eval "(dolist (pkg '(transient mysql pg package-lint)) (unless (package-installed-p pkg) (package-install pkg)))"

      - name: Run main ERT suite
        run: test/run-ci.sh main

      - name: Run database backend ERT suite
        run: test/run-ci.sh db

      - name: Byte compile
        run: test/run-ci.sh byte-compile

      - name: Package lint
        run: test/run-ci.sh package-lint

      - name: Checkdoc package files
        run: test/run-ci.sh checkdoc
